name: barpos
description: "Bar POS Flutter Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & storage
  get: ^4.7.3
  get_storage: ^2.1.1
  shared_preferences: ^2.5.5

  # Networking
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # =========================
  # ASSETS CONFIGURATION
  # =========================
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/

  # =========================
  # FONTS (optional but ready)
  # =========================
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700